<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum de Fotos - Multicuadrícula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --page-width: min(48vw, calc(92vh * 3 / 4));
            --book-width: calc(var(--page-width) * 2);
            --book-height: calc(var(--page-width) * 4 / 3);
            --page-color: #fff;
            --cover-color: #fff;
            --accent-color: #00104A;
            --page-footer-height: clamp(32px, 6%, 44px);
        }

        @font-face {
            font-family: 'EMprint Regular';
            src: url('fonts/EMprint-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'EMprint Bold';
            src: url('fonts/EMprint-Bold.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'EMprint Semibold';
            src: url('fonts/EMprint-Semibold.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
            perspective: 2500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: clamp(8px, 1.8vh, 18px) 0;
            overflow-x: hidden;
            font-family: 'EMprint Regular', sans-serif;
            box-sizing: border-box;
        }

        /* Contenedor del Libro */
        .book-container {
            position: relative;
            width: var(--book-width);
            height: var(--book-height);
            transform-style: preserve-3d;
            transition: transform 0.5s;
            filter: drop-shadow(0 24px 48px rgba(0,0,0,0.6));
            flex-shrink: 0;
        }

        /* Estilo de cada página */
        .page {
            position: absolute;
            width: 50%;
            height: 100%;
            top: 0;
            left: 50%; /* ocupa la mitad derecha; al girar pasa a la izquierda */
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
            cursor: pointer;
        }

        .page.flipped {
            transform: rotateY(-180deg);
        }

        /* Caras de la página */
        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            backface-visibility: hidden;
            padding: clamp(10px, 2.5%, 20px);
            padding-bottom: calc(var(--page-footer-height) + clamp(10px, 2.5%, 20px));
            box-shadow: inset 3px 0px 20px rgba(0,0,0,0.08), 4px 0 16px rgba(0,0,0,0.2);
            border: 1px solid #00104A;
            background-color: var(--page-color);
            border-radius: 0 12px 12px 0;
            box-sizing: border-box;
        }

        .back {
            transform: rotateY(180deg);
            border-radius: 12px 0 0 12px;
        }

        /* Portadas Especiales */
        .cover-front {
            background-color: var(--cover-color) !important;
            color: var(--accent-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: none !important;
        }

        .cover-front h1 {
            border: 2px solid var(--accent-color);
            padding: clamp(12px, 3%, 24px);
            font-family: "EMprint Semibold";
            font-size: clamp(1.25rem, 4vw, 2.25rem);
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1.4;
        }

        .cover-front p {
            font-family: "EMprint Bold";
        }

        .cover-back {
            background-color: var(--cover-color) !important;
            border: none !important;
        }

        /* Mitad izquierda del libro (visible antes de girar páginas) */
        .book-left-cover {
            position: absolute;
            left: 0;
            top: 0;
            width: 50%;
            height: 100%;
            background-color: transparent;
            border-radius: 12px 0 0 12px;
            z-index: 0;
        }

        /* Cuadrícula de fotos (6 fotos por cara) */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: clamp(6px, 1.5%, 10px);
            width: 100%;
            height: 100%;
        }

        .photo-wrapper {
            background: #e5e7eb;
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
            transition: transform 0.25s;
            border-radius: 4px;
        }

        .photo-wrapper:hover {
            transform: scale(1.04);
            z-index: 10;
        }

        .photo-wrapper img,
        .photo-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .unsupported-media {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 12px;
            text-align: center;
            color: #6b7280;
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
            font-size: 0.72rem;
            line-height: 1.35;
        }

        .unsupported-media strong {
            color: #111827;
            font-size: 0.78rem;
        }

        .page-footer {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: var(--page-footer-height);
            background: #00104A;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 12px;
            box-sizing: border-box;
            border-radius: 0 0 12px 0;
        }

        .back .page-footer {
            justify-content: flex-start;
            border-radius: 0 0 0 12px;
        }

        .footer-logo {
            position: absolute;
            position: static;
            width: clamp(32px, 6%, 48px);
            height: auto;
            opacity: 0.95;
        }

        @media (max-width: 640px) {
            :root {
                /* Una sola página a la vez en móvil vertical */
                --page-width: min(94vw, 400px);
                --book-width: var(--page-width);
                --book-height: min(calc(var(--page-width) * 4 / 3), 70vh);
                --page-footer-height: 30px;
            }

            body {
                justify-content: center;
                padding: 0;
                min-height: 100dvh;
            }

            /* Páginas ocupan todo el ancho del libro */
            .page {
                width: 100%;
                left: 0;
            }

            /* Ocultar panel izquierdo: no aplica en vista simple */
            .book-left-cover {
                display: none;
            }

            .front, .back {
                padding: 8px;
                padding-bottom: calc(var(--page-footer-height) + 8px);
                border-radius: 8px;
            }

            /* 4 fotos por cara tambien en movil */
            .photo-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(2, 1fr);
                gap: 5px;
            }

            .photo-wrapper {
                border-width: 2px;
                border-radius: 3px;
            }

            .page-footer {
                padding: 0 8px;
            }

            .footer-logo {
                width: 24px;
            }

            .cover-front h1 {
                font-size: clamp(1rem, 6vw, 1.5rem);
                letter-spacing: 2px;
                padding: 10px 14px;
            }
        }

        /* ─── Loading Screen ─────────────────────────────── */
        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px;
            transition: opacity 0.7s ease;
        }

        #loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #loading-logo {
            width: clamp(100px, 18vw, 150px);
            height: auto;
            animation: loading-pulse 2.2s ease-in-out infinite;
        }

        @keyframes loading-pulse {
            0%, 100% { opacity: 1;   transform: scale(1);    }
            50%       { opacity: 0.7; transform: scale(0.96); }
        }

        #loading-spinner {
            width: 46px;
            height: 46px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: rgba(255,255,255,0.85);
            border-radius: 50%;
            animation: loading-spin 0.85s linear infinite;
        }

        @keyframes loading-spin {
            to { transform: rotate(360deg); }
        }

        #loading-label {
            color: rgba(255,255,255,0.65);
            font-family: 'EMprint Regular', sans-serif;
            font-size: 0.82rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        #loading-bar-wrap {
            width: clamp(180px, 38vw, 280px);
            height: 3px;
            background: rgba(255,255,255,0.12);
            border-radius: 2px;
            overflow: hidden;
        }

        #loading-bar {
            height: 100%;
            background: rgba(255,255,255,0.88);
            border-radius: 2px;
            width: 0%;
            transition: width 0.22s ease;
        }

        #loading-count {
            color: rgba(255,255,255,0.32);
            font-family: 'EMprint Regular', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 1px;
            margin-top: -10px;
        }
        /* ────────────────────────────────────────────────── */

        /* Efecto de lomo de libro */
        .page::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 10px;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.1), transparent);
            z-index: 5;
        }

        /* Botones de navegación */
        .nav-buttons {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 18px;
            flex-shrink: 0;
        }

        .nav-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.28);
            color: white;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.15s;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            flex-shrink: 0;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.24);
        }

        .nav-btn:active:not(:disabled) {
            transform: scale(0.9);
        }

        .nav-btn:disabled {
            opacity: 0.2;
            cursor: default;
        }

        .page-counter {
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            min-width: 56px;
            text-align: center;
        }

        @media (max-width: 640px) {
            .nav-buttons {
                margin-top: 14px;
                gap: 16px;
            }
            .nav-btn {
                width: 56px;
                height: 56px;
                font-size: 1.5rem;
            }
        }

        /* ─── Lightbox ─────────────────────────────────── */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0,0,0,0.93);
            align-items: center;
            justify-content: center;
            padding: 16px;
            box-sizing: border-box;
            animation: lb-in 0.2s ease;
        }

        #lightbox.open {
            display: flex;
        }

        @keyframes lb-in {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        #lightbox-media {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 6px;
            box-shadow: 0 8px 48px rgba(0,0,0,0.8);
        }

        #lightbox-video {
            max-width: 100%;
            max-height: 100%;
            border-radius: 6px;
            box-shadow: 0 8px 48px rgba(0,0,0,0.8);
            outline: none;
        }

        #lightbox-close {
            position: fixed;
            top: 14px;
            right: 18px;
            color: white;
            font-size: 2rem;
            line-height: 1;
            background: rgba(255,255,255,0.12);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 10000;
            -webkit-tap-highlight-color: transparent;
        }

        #lightbox-close:hover {
            background: rgba(255,255,255,0.25);
        }
        /* ──────────────────────────────────────────────── */
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <img src="logo_mobil.png" alt="Logo Mobil" id="loading-logo">
        <div id="loading-spinner"></div>
        <div id="loading-label">Cargando álbum</div>
        <div id="loading-bar-wrap">
            <div id="loading-bar"></div>
        </div>
        <div id="loading-count">0 / 0</div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" role="dialog" aria-modal="true" aria-label="Visor de imagen">
        <button id="lightbox-close" aria-label="Cerrar">&times;</button>
        <img id="lightbox-media" src="" alt="" style="display:none;">
        <video id="lightbox-video" controls playsinline style="display:none;"></video>
    </div>

    <div id="book" class="book-container">
        <div class="book-left-cover"></div>
        <!-- Las páginas se generarán dinámicamente -->
    </div>

    <div class="nav-buttons">
        <button class="nav-btn" id="btn-prev" aria-label="Página anterior">&#8592;</button>
        <span class="page-counter" id="page-counter">1 / 1</span>
        <button class="nav-btn" id="btn-next" aria-label="Página siguiente">&#8594;</button>
    </div>

    <script>
        // Archivos locales del album
        const mediaFiles = [
            // "fotos/Thumbs/IMG_7330.mp4",
            "fotos/Thumbs/IMG_7332.jpg",
            // "fotos/Thumbs/IMG_7355.mp4",
            // "fotos/Thumbs/IMG_7357.mp4",
            "fotos/Thumbs/IMG_7364.jpg",
            "fotos/Thumbs/IMG_7374.jpg",
            "fotos/Thumbs/IMG_7393.jpg",
            "fotos/Thumbs/IMG_7410.jpg",
            "fotos/Thumbs/IMG_7412.jpg",
            "fotos/Thumbs/IMG_7458.jpg",
            "fotos/Thumbs/IMG_7460.jpg",
            // "fotos/Thumbs/IMG_7496.mp4",
            "fotos/Thumbs/IMG_7523.jpg",
            // "fotos/Thumbs/IMG_7537.mp4",
            "fotos/Thumbs/IMG_7548.jpg",
            // "fotos/Thumbs/IMG_7561.mp4",
            "fotos/Thumbs/IMG_7564.jpg",
            "fotos/Thumbs/IMG_7571.jpg",
            "fotos/Thumbs/IMG_7645.jpg",
            "fotos/Thumbs/IMG_7648.jpg",
            "fotos/Thumbs/IMG_7656.jpg",
            "fotos/Thumbs/IMG_7676.jpg",
            "fotos/Thumbs/IMG_7683.jpg",
            "fotos/Thumbs/IMG_7698.jpg",
            "fotos/Thumbs/IMG_7700.jpg",
            "fotos/Thumbs/IMG_7705.jpg",
            "fotos/Thumbs/IMG_7721.jpg",
            "fotos/Thumbs/IMG_7724.jpg",
            "fotos/Thumbs/IMG_7727.jpg",
            "fotos/Thumbs/IMG_7743.jpg",
            "fotos/Thumbs/IMG_7750.jpg",
            "fotos/Thumbs/IMG_7764.jpg",
            "fotos/Thumbs/IMG_7766.jpg",
            "fotos/Thumbs/IMG_7769.jpg"
        ];

        // Elimina duplicados conservando el orden original.
        const allPhotos = [...new Set(mediaFiles)];

        const PHOTOS_PER_FACE = 4;
        const COVER_BACK_PHOTOS = 4;

        function isMobile() {
            return window.innerWidth <= 640;
        }

        const VIDEO_FALLBACK_POSTER = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
                <defs>
                    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#111827"/>
                        <stop offset="100%" stop-color="#374151"/>
                    </linearGradient>
                </defs>
                <rect width="400" height="300" fill="url(#bg)"/>
                <circle cx="200" cy="150" r="44" fill="rgba(255,255,255,0.15)"/>
                <polygon points="188,126 188,174 230,150" fill="#ffffff"/>
                <text x="200" y="262" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif" font-size="20">VIDEO</text>
            </svg>
        `)}`;
        const book = document.getElementById('book');
        let currentPage = 0;
        let lastTouchTime = 0;
        let lastSwipeFlipTime = 0;

        function initAlbum() {
            // Generar Portada
            createCover();

            // En móvil: 1 cara por vuelta (el reverso nunca se ve en modo página única).
            // En desktop: 2 caras por vuelta (frente + reverso visibles simultáneamente).
            const mobile = isMobile();
            const photosPerTurn = mobile ? PHOTOS_PER_FACE : PHOTOS_PER_FACE * 2;
            // En móvil, el reverso de la portada tampoco se ve, así que no saltamos fotos.
            const coverSkip = mobile ? 0 : COVER_BACK_PHOTOS;
            const remainingPhotos = allPhotos.slice(coverSkip);
            const totalPages = Math.ceil(remainingPhotos.length / photosPerTurn);

            for (let i = 0; i < totalPages; i++) {
                const startIdx = i * photosPerTurn;
                const face1Photos = remainingPhotos.slice(startIdx, startIdx + PHOTOS_PER_FACE);
                const face2Photos = mobile
                    ? []
                    : remainingPhotos.slice(startIdx + PHOTOS_PER_FACE, startIdx + photosPerTurn);
                createGridPage(face1Photos, face2Photos, i + 1);
            }

            // Contraportada final solo en escritorio.
            if (!mobile) {
                createBackCover();
            }

            // Quitar hasta 2 páginas finales sin contenido útil.
            removeTrailingBlankPages(2);

            // Ajustar Z-index inicial
            updateZIndex();

            // Cargar solo medios cercanos para acelerar la interacción.
            hydrateMediaNearCurrentPage();

            // Interacciones globales para escritorio y móvil
            setupBookInteractions();
            updateNavButtons();
        }

        function removeTrailingBlankPages(limit = 2) {
            let removed = 0;

            while (removed < limit) {
                const pages = Array.from(book.querySelectorAll('.page'));
                const lastPage = pages[pages.length - 1];
                if (!lastPage) break;

                const hasMedia = lastPage.querySelector('.photo-wrapper') !== null;
                const isFrontCover = lastPage.querySelector('.cover-front') !== null;
                if (hasMedia || isFrontCover) break;

                lastPage.remove();
                removed += 1;
            }
        }

        function createCover() {
            const mobile = isMobile();
            const page = document.createElement('div');
            page.className = 'page';
            // En móvil el reverso de la portada nunca es visible: se deja vacío
            // para que esas fotos aparezcan en las páginas de contenido.
            const backContent = mobile
                ? ''
                : `<div class="photo-grid">${generateGridHTML(allPhotos.slice(0, COVER_BACK_PHOTOS))}</div>`;
            page.innerHTML = `
                <div class="front cover-front">
                    <img src="logo_mobil.png" alt="Logo Mobil" style="width: 150px; height: auto; margin-bottom: 30px;">
                    <h1>Recuerdos<br>Mobil Consorcio</h1>
                    <p class="mt-4 opacity-70">2026</p>
                </div>
                <div class="back">${backContent}</div>
            `;

            const frontDiv = page.querySelector('.front');
            const backDiv = page.querySelector('.back');

            const frontFooter = document.createElement('div');
            frontFooter.className = 'page-footer';

            const logoFront = document.createElement('img');
            logoFront.src = 'logo_mobil.png';
            logoFront.alt = 'Logo Mobil';
            logoFront.className = 'footer-logo';
            frontFooter.appendChild(logoFront);
            frontDiv.appendChild(frontFooter);

            const backFooter = document.createElement('div');
            backFooter.className = 'page-footer';

            const logoBack = document.createElement('img');
            logoBack.src = 'logo_mini.png';
            logoBack.alt = 'Logo Mobil';
            logoBack.className = 'footer-logo';
            backFooter.appendChild(logoBack);
            backDiv.appendChild(backFooter);

            book.appendChild(page);
        }

        function createGridPage(photosFront, photosBack, index) {
            if (photosFront.length === 0 && photosBack.length === 0) return;

            const page = document.createElement('div');
            page.className = 'page';
            
            const frontHTML = photosFront.length > 0 
                ? `<div class="photo-grid">${generateGridHTML(photosFront)}</div>`
                : ``;

            const backHTML = photosBack.length > 0
                ? `<div class="photo-grid">${generateGridHTML(photosBack)}</div>`
                : ``;

            page.innerHTML = `
                <div class="front">
                    ${frontHTML}
                </div>
                <div class="back">
                    ${backHTML}
                </div>
            `;
            
            // Añadir logo mini a ambas caras
            const frontDiv = page.querySelector('.front');
            const backDiv = page.querySelector('.back');

            const frontFooter = document.createElement('div');
            frontFooter.className = 'page-footer';
            
            const logoFront = document.createElement('img');
            logoFront.src = 'logo_mini.png';
            logoFront.alt = 'Logo Mobil';
            logoFront.className = 'footer-logo';
            frontFooter.appendChild(logoFront);
            frontDiv.appendChild(frontFooter);
            
            const backFooter = document.createElement('div');
            backFooter.className = 'page-footer';

            const logoBack = document.createElement('img');
            logoBack.src = 'logo_mini.png';
            logoBack.alt = 'Logo Mobil';
            logoBack.className = 'footer-logo';
            backFooter.appendChild(logoBack);
            backDiv.appendChild(backFooter);
            book.appendChild(page);
        }

        function createBackCover() {
            const page = document.createElement('div');
            page.className = 'page';
            page.innerHTML = `
                <div class="front">
                    <div class="flex flex-col items-center justify-center h-full text-gray-400">
                        <p>Total de archivos del album: ${allPhotos.length}</p>
                    </div>
                </div>
                <div class="back cover-back"></div>
            `;

            // Añadir logo mini a contraportada
            const frontDiv = page.querySelector('.front');
            const backDiv = page.querySelector('.back');

            const frontFooter = document.createElement('div');
            frontFooter.className = 'page-footer';
            
            const logoFront = document.createElement('img');
            logoFront.src = 'logo_mini.png';
            logoFront.alt = 'Logo Mobil';
            logoFront.className = 'footer-logo';
            frontFooter.appendChild(logoFront);
            frontDiv.appendChild(frontFooter);
            
            const backFooter = document.createElement('div');
            backFooter.className = 'page-footer';

            const logoBack = document.createElement('img');
            logoBack.src = 'logo_mini.png';
            logoBack.alt = 'Logo Mobil';
            logoBack.className = 'footer-logo';
            backFooter.appendChild(logoBack);
            backDiv.appendChild(backFooter);
            
            book.appendChild(page);
        }

        function getFileExtension(src) {
            return src.split('.').pop().toLowerCase();
        }

        function isVideoFile(src) {
            return ['mp4', 'mov', 'webm', 'ogg'].includes(getFileExtension(src));
        }

        function isBrowserFriendlyImage(src) {
            return ['jpg', 'jpeg', 'png', 'gif', 'webp', 'avif', 'svg'].includes(getFileExtension(src));
        }

        function generateGridHTML(photos) {
            return photos.map(src => {
                if (isVideoFile(src)) {
                    return `
                        <div class="photo-wrapper">
                            <video data-src="${src}" class="lazy-media" muted playsinline preload="none" controls poster="${VIDEO_FALLBACK_POSTER}"></video>
                        </div>
                    `;
                }

                if (isBrowserFriendlyImage(src)) {
                    return `
                        <div class="photo-wrapper">
                            <img data-src="${src}" class="lazy-media" alt="Recuerdo" loading="lazy" decoding="async">
                        </div>
                    `;
                }

                return `
                    <div class="photo-wrapper">
                        <div class="unsupported-media">
                            <strong>${src.split('/').pop()}</strong>
                            <span>Formato no compatible en este navegador</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function applyVideoThumbnail(video) {
            if (!(video instanceof HTMLVideoElement)) return;
            if (video.getAttribute('data-poster-ready') === 'true') return;

            const captureFrame = () => {
                if (video.videoWidth === 0 || video.videoHeight === 0) return;

                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;

                    const ctx = canvas.getContext('2d');
                    if (!ctx) return;

                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const posterDataUrl = canvas.toDataURL('image/jpeg', 0.75);
                    video.setAttribute('poster', posterDataUrl);
                } catch (error) {
                    video.setAttribute('poster', VIDEO_FALLBACK_POSTER);
                }

                video.setAttribute('data-poster-ready', 'true');
                video.pause();
                video.currentTime = 0;
            };

            if (video.readyState >= 2) {
                captureFrame();
                return;
            }

            const onLoadedData = () => captureFrame();
            const onError = () => {
                video.setAttribute('poster', VIDEO_FALLBACK_POSTER);
                video.setAttribute('data-poster-ready', 'true');
            };

            video.addEventListener('loadeddata', onLoadedData, { once: true });
            video.addEventListener('error', onError, { once: true });
        }

        function hydrateMediaNearCurrentPage() {
            const pages = Array.from(document.querySelectorAll('.page'));

            pages.forEach((page, pageIndex) => {
                if (Math.abs(pageIndex - currentPage) > 1) return;

                const lazyMedia = page.querySelectorAll('.lazy-media:not([data-loaded="true"])');
                lazyMedia.forEach(media => {
                    const src = media.getAttribute('data-src');
                    if (!src) return;

                    media.setAttribute('src', src);
                    media.setAttribute('data-loaded', 'true');

                    if (media instanceof HTMLVideoElement) {
                        media.setAttribute('preload', 'metadata');
                        applyVideoThumbnail(media);
                    }
                });
            });
        }

        function preloadRemainingMedia() {
            const mediaElements = Array.from(document.querySelectorAll('.lazy-media'));

            let index = 0;

            function loadNextBatch() {
                const batchSize = 2; // carga suave

                for (let i = 0; i < batchSize && index < mediaElements.length; i++, index++) {
                    const media = mediaElements[index];

                    if (media.getAttribute('data-loaded') === 'true') continue;

                    const src = media.getAttribute('data-src');
                    if (!src) continue;

                    // Precarga silenciosa
                    if (media.tagName === 'IMG') {
                        const img = new Image();
                        img.src = src;
                    }

                    if (media.tagName === 'VIDEO') {
                        const video = document.createElement('video');
                        video.src = src;
                        video.preload = 'metadata';
                    }

                    // Marca como precargado
                    media.setAttribute('data-preloaded', 'true');
                }

                if (index < mediaElements.length) {
                    requestIdleCallback(loadNextBatch);
                }
            }

            requestIdleCallback(loadNextBatch);
        }

        function flipNextPage() {
            const pages = Array.from(document.querySelectorAll('.page'));
            if (currentPage >= pages.length - 1) return;

            pages[currentPage].classList.add('flipped');
            currentPage += 1;
            updateZIndex();
            hydrateMediaNearCurrentPage();
            updateNavButtons();
        }

        function flipPrevPage() {
            const pages = Array.from(document.querySelectorAll('.page'));
            if (currentPage <= 0) return;

            currentPage -= 1;
            pages[currentPage].classList.remove('flipped');
            updateZIndex();
            hydrateMediaNearCurrentPage();
            updateNavButtons();
        }

        function handleBookTap(clientX) {
            const rect = book.getBoundingClientRect();
            const x = clientX - rect.left;

            if (x > rect.width * 0.5) {
                flipNextPage();
            } else {
                flipPrevPage();
            }
        }

        function updateNavButtons() {
            const pages = Array.from(document.querySelectorAll('.page'));
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            const counter = document.getElementById('page-counter');
            const totalStates = Math.max(pages.length, 1);
            const currentState = Math.min(currentPage + 1, totalStates);

            if (btnPrev) btnPrev.disabled = currentPage <= 0;
            if (btnNext) btnNext.disabled = currentPage >= pages.length - 1;
            if (counter) counter.textContent = `${currentState} / ${totalStates}`;
        }

        function setupBookInteractions() {
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            if (btnPrev) btnPrev.addEventListener('click', flipPrevPage);
            if (btnNext) btnNext.addEventListener('click', flipNextPage);

            const mobile = isMobile();
            let touchStartX = 0;
            let touchStartY = 0;
            let canSwipeFlip = true;

            if (!mobile) {
                book.addEventListener('click', function(event) {
                    if (Date.now() - lastTouchTime < 500) return;
                    handleBookTap(event.clientX);
                });
            }

            book.addEventListener('touchstart', function(event) {
                const touch = event.changedTouches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
                canSwipeFlip = event.changedTouches.length === 1;
            }, { passive: true });

            book.addEventListener('touchend', function(event) {
                if (!canSwipeFlip) return;

                const lightbox = document.getElementById('lightbox');
                if (lightbox && lightbox.classList.contains('open')) return;

                const touch = event.changedTouches[0];
                const deltaX = touch.clientX - touchStartX;
                const deltaY = touch.clientY - touchStartY;
                lastTouchTime = Date.now();

                // En móvil: solo swipe horizontal para cambiar página.
                if (mobile) {
                    if (Math.abs(deltaX) > 35 && Math.abs(deltaX) > Math.abs(deltaY)) {
                        lastSwipeFlipTime = Date.now();
                        if (deltaX < 0) {
                            flipNextPage();
                        } else {
                            flipPrevPage();
                        }
                    }
                    return;
                }

                if (Math.abs(deltaX) > 35) {
                    if (deltaX < 0) {
                        flipNextPage();
                    } else {
                        flipPrevPage();
                    }
                    return;
                }

                handleBookTap(touch.clientX);
            }, { passive: true });
        }

        function updateZIndex() {
            const pages = Array.from(document.querySelectorAll('.page'));
            pages.forEach((page, index) => {
                if (page.classList.contains('flipped')) {
                    page.style.zIndex = index;
                } else {
                    page.style.zIndex = pages.length - index;
                }
            });
        }

        /* ─── Lightbox ─────────────────────────────────── */
        (function () {
            const lightbox  = document.getElementById('lightbox');
            const lbImg     = document.getElementById('lightbox-media');
            const lbVideo   = document.getElementById('lightbox-video');
            const lbClose   = document.getElementById('lightbox-close');

            function openLightbox(src, isVideo) {
                if (isVideo) {
                    lbImg.style.display   = 'none';
                    lbVideo.style.display = '';
                    lbVideo.src           = src;
                    lbVideo.load();
                    lbVideo.play().catch(() => {});
                } else {
                    lbVideo.style.display = 'none';
                    lbImg.style.display   = '';
                    lbImg.src             = src;
                }
                lightbox.classList.add('open');
                document.body.style.overflow = 'hidden';
            }

            function closeLightbox() {
                lightbox.classList.remove('open');
                lbVideo.pause();
                lbVideo.src = '';
                lbImg.src   = '';
                document.body.style.overflow = '';
            }

            lbClose.addEventListener('click', closeLightbox);

            // Cerrar tocando el fondo oscuro
            lightbox.addEventListener('click', function (e) {
                if (e.target === lightbox) closeLightbox();
            });

            // Cerrar con Escape en desktop
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') closeLightbox();
            });

            // Delegar clics en photo-wrappers; capture:true para interceptar ANTES del handler de giro de página
            document.getElementById('book').addEventListener('click', function (e) {
                // Si el clic viene justo despues de un swipe, no abrir popup.
                if (Date.now() - lastSwipeFlipTime < 450) {
                    return;
                }

                const wrapper = e.target.closest('.photo-wrapper');
                if (!wrapper) return;

                e.stopPropagation();

                const video = wrapper.querySelector('video.lazy-media');
                const img   = wrapper.querySelector('img.lazy-media');

                if (video) {
                    const src = video.getAttribute('src') || video.getAttribute('data-src');
                    if (src) openLightbox(src, true);
                } else if (img) {
                    const src = img.getAttribute('src') || img.getAttribute('data-src');
                    if (src) openLightbox(src, false);
                }
            }, true);
        })();
        /* ──────────────────────────────────────────────── */

        (async function startAlbum() {
            // 1. Construir el libro (DOM) detrás de la pantalla de carga
            initAlbum();

            // 2. Precargar todas las imágenes antes de mostrar el álbum
            const imagesToPreload = mediaFiles.filter(src => !isVideoFile(src));
            const total = imagesToPreload.length;
            let loaded = 0;

            const bar      = document.getElementById('loading-bar');
            const countEl  = document.getElementById('loading-count');

            if (countEl) countEl.textContent = `0 / ${total}`;

            function updateProgress() {
                loaded++;
                const pct = Math.round((loaded / total) * 100);
                if (bar)     bar.style.width       = pct + '%';
                if (countEl) countEl.textContent   = `${loaded} / ${total}`;
            }

            await Promise.all(imagesToPreload.map(src => new Promise(resolve => {
                const img = new Image();
                img.onload  = () => { updateProgress(); resolve(); };
                img.onerror = () => { updateProgress(); resolve(); };
                img.src = src;
            })));

            // 3. Asignar src a TODOS los elementos lazy del DOM (ya están en caché → renderizado instantáneo)
            document.querySelectorAll('.lazy-media[data-src]').forEach(media => {
                if (media.getAttribute('data-loaded') === 'true') return;
                const src = media.getAttribute('data-src');
                if (!src) return;
                media.setAttribute('src', src);
                media.setAttribute('data-loaded', 'true');
                if (media instanceof HTMLVideoElement) {
                    media.setAttribute('preload', 'metadata');
                }
            });

            // 4. Todas las imágenes cargadas → ocultar pantalla de carga
            const screen = document.getElementById('loading-screen');
            if (screen) {
                screen.classList.add('fade-out');
                setTimeout(() => { screen.style.display = 'none'; }, 750);
            }

            // 5. Precarga diferida en segundo plano (videos u otros)
            setTimeout(() => { preloadRemainingMedia(); }, 800);
        })();
    </script>
