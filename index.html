<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum de Fotos - Multicuadrícula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --page-width: min(45vw, 480px);
            --book-width: calc(var(--page-width) * 2);
            --book-height: min(calc(var(--page-width) * 4 / 3), 86vh);
            --page-color: #fdfdfd;
            --cover-color: #0a0a0a;
            --accent-color: #fff;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
            perspective: 2500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: clamp(16px, 4vh, 48px) 0 24px;
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        /* Contenedor del Libro */
        .book-container {
            position: relative;
            width: var(--book-width);
            height: var(--book-height);
            transform-style: preserve-3d;
            transition: transform 0.5s;
            filter: drop-shadow(0 24px 48px rgba(0,0,0,0.6));
            flex-shrink: 0;
        }

        /* Estilo de cada página */
        .page {
            position: absolute;
            width: 50%;
            height: 100%;
            top: 0;
            left: 50%; /* ocupa la mitad derecha; al girar pasa a la izquierda */
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
            cursor: pointer;
        }

        .page.flipped {
            transform: rotateY(-180deg);
        }

        /* Caras de la página */
        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            backface-visibility: hidden;
            padding: clamp(10px, 2.5%, 20px);
            box-shadow: inset 3px 0px 20px rgba(0,0,0,0.08), 4px 0 16px rgba(0,0,0,0.2);
            border: 1px solid #d1d5db;
            background-color: var(--page-color);
            border-radius: 0 12px 12px 0;
        }

        .back {
            transform: rotateY(180deg);
            border-radius: 12px 0 0 12px;
        }

        /* Portadas Especiales */
        .cover-front {
            background-color: var(--cover-color) !important;
            color: var(--accent-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: none !important;
        }

        .cover-front h1 {
            border: 2px solid var(--accent-color);
            padding: clamp(12px, 3%, 24px);
            font-size: clamp(1.25rem, 4vw, 2.25rem);
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1.4;
        }

        .cover-back {
            background-color: var(--cover-color) !important;
            border: none !important;
        }

        /* Mitad izquierda del libro (visible antes de girar páginas) */
        .book-left-cover {
            position: absolute;
            left: 0;
            top: 0;
            width: 50%;
            height: 100%;
            background-color: transparent;
            border-radius: 12px 0 0 12px;
            z-index: 0;
        }

        /* Cuadrícula de fotos (6 fotos por cara) */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: clamp(6px, 1.5%, 10px);
            width: 100%;
            height: 100%;
        }

        .photo-wrapper {
            background: #e5e7eb;
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
            transition: transform 0.25s;
            border-radius: 4px;
        }

        .photo-wrapper:hover {
            transform: scale(1.04);
            z-index: 10;
        }

        .photo-wrapper img,
        .photo-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .unsupported-media {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 12px;
            text-align: center;
            color: #6b7280;
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
            font-size: 0.72rem;
            line-height: 1.35;
        }

        .unsupported-media strong {
            color: #111827;
            font-size: 0.78rem;
        }

        .footer-logo {
            position: absolute;
            bottom: 8px;
            width: clamp(28px, 5%, 44px);
            height: auto;
            opacity: 0.65;
        }

        .front .footer-logo { right: 12px; }
        .back .footer-logo { left: 12px; }

        @media (max-width: 640px) {
            :root {
                /* Una sola página a la vez en móvil vertical */
                --page-width: min(94vw, 400px);
                --book-width: var(--page-width);
                --book-height: min(calc(var(--page-width) * 4 / 3), 70vh);
            }

            body {
                justify-content: center;
                padding: 0;
                min-height: 100dvh;
            }

            /* Páginas ocupan todo el ancho del libro */
            .page {
                width: 100%;
                left: 0;
            }

            /* Ocultar panel izquierdo: no aplica en vista simple */
            .book-left-cover {
                display: none;
            }

            .front, .back {
                padding: 8px;
                border-radius: 8px;
            }

            /* Grid 3 columnas × 2 filas: fotos más anchas en pantalla vertical */
            .photo-grid {
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: repeat(2, 1fr);
                gap: 5px;
            }

            .photo-wrapper {
                border-width: 2px;
                border-radius: 3px;
            }

            .footer-logo {
                width: 20px;
                bottom: 4px;
            }

            .front .footer-logo { right: 5px; }
            .back .footer-logo { left: 5px; }

            .cover-front h1 {
                font-size: clamp(1rem, 6vw, 1.5rem);
                letter-spacing: 2px;
                padding: 10px 14px;
            }
        }

        /* Efecto de lomo de libro */
        .page::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 10px;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.1), transparent);
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id="book" class="book-container">
        <div class="book-left-cover"></div>
        <!-- Las páginas se generarán dinámicamente -->
    </div>

    <p class="mt-4 md:mt-8 italic text-xs md:text-sm text-center px-4" style="color: rgba(255,255,255,0.45); letter-spacing: 0.05em;">Toca las páginas para explorar los recuerdos</p>

    <script>
        // Archivos locales del album
        const mediaFiles = [
            "fotos/Thumbs/IMG_7330.mp4",
            "fotos/Thumbs/IMG_7332.jpg",
            "fotos/Thumbs/IMG_7355.mp4",
            "fotos/Thumbs/IMG_7357.mp4",
            "fotos/Thumbs/IMG_7364.jpg",
            "fotos/Thumbs/IMG_7374.jpg",
            "fotos/Thumbs/IMG_7393.jpg",
            "fotos/Thumbs/IMG_7410.jpg",
            "fotos/Thumbs/IMG_7412.jpg",
            "fotos/Thumbs/IMG_7458.jpg",
            "fotos/Thumbs/IMG_7460.jpg",
            "fotos/Thumbs/IMG_7496.mp4",
            "fotos/Thumbs/IMG_7523.jpg",
            "fotos/Thumbs/IMG_7537.mp4",
            "fotos/Thumbs/IMG_7548.jpg",
            "fotos/Thumbs/IMG_7561.mp4",
            "fotos/Thumbs/IMG_7564.jpg",
            "fotos/Thumbs/IMG_7571.jpg",
            "fotos/Thumbs/IMG_7645.jpg",
            "fotos/Thumbs/IMG_7648.jpg",
            "fotos/Thumbs/IMG_7656.jpg",
            "fotos/Thumbs/IMG_7676.jpg",
            "fotos/Thumbs/IMG_7683.jpg",
            "fotos/Thumbs/IMG_7698.jpg",
            "fotos/Thumbs/IMG_7700.jpg",
            "fotos/Thumbs/IMG_7705.jpg",
            "fotos/Thumbs/IMG_7721.jpg",
            "fotos/Thumbs/IMG_7724.jpg",
            "fotos/Thumbs/IMG_7727.jpg",
            "fotos/Thumbs/IMG_7743.jpg",
            "fotos/Thumbs/IMG_7750.jpg",
            "fotos/Thumbs/IMG_7764.jpg",
            "fotos/Thumbs/IMG_7766.jpg",
            "fotos/Thumbs/IMG_7769.jpg"
        ];

        // Elimina duplicados conservando el orden original.
        const allPhotos = [...new Set(mediaFiles)];

        const PHOTOS_PER_FACE = 6;
        const COVER_BACK_PHOTOS = 6;
        const VIDEO_FALLBACK_POSTER = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
                <defs>
                    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#111827"/>
                        <stop offset="100%" stop-color="#374151"/>
                    </linearGradient>
                </defs>
                <rect width="400" height="300" fill="url(#bg)"/>
                <circle cx="200" cy="150" r="44" fill="rgba(255,255,255,0.15)"/>
                <polygon points="188,126 188,174 230,150" fill="#ffffff"/>
                <text x="200" y="262" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif" font-size="20">VIDEO</text>
            </svg>
        `)}`;
        const book = document.getElementById('book');
        let currentPage = 0;
        let lastTouchTime = 0;

        function initAlbum() {
            // Generar Portada
            createCover();

            // Generar Páginas con cuadrícula
            // Cada página tiene 2 caras, cada cara tiene PHOTOS_PER_FACE
            const photosPerPage = PHOTOS_PER_FACE * 2;
            const remainingPhotos = allPhotos.slice(COVER_BACK_PHOTOS);
            const totalPages = Math.ceil(remainingPhotos.length / photosPerPage);

            for (let i = 0; i < totalPages; i++) {
                const startIdx = i * photosPerPage;
                const face1Photos = remainingPhotos.slice(startIdx, startIdx + PHOTOS_PER_FACE);
                const face2Photos = remainingPhotos.slice(startIdx + PHOTOS_PER_FACE, startIdx + photosPerPage);
                
                createGridPage(face1Photos, face2Photos, i + 1);
            }

            // Contraportada final
            createBackCover();

            // Ajustar Z-index inicial
            updateZIndex();

            // Cargar solo medios cercanos para acelerar la interacción.
            hydrateMediaNearCurrentPage();

            // Interacciones globales para escritorio y móvil
            setupBookInteractions();
        }

        function createCover() {
            const page = document.createElement('div');
            page.className = 'page';
            page.innerHTML = `
                <div class="front cover-front">
                    <img src="logo_mobil.png" alt="Logo Mobil" style="width: 120px; height: auto; margin-bottom: 30px;">
                    <h1>Recuerdos<br>Mobil Consorcio</h1>
                    <p class="mt-4 opacity-70">2026</p>
                </div>
                <div class="back">
                    <div class="photo-grid">${generateGridHTML(allPhotos.slice(0, COVER_BACK_PHOTOS))}</div>
                </div>
            `;
            book.appendChild(page);
        }

        function createGridPage(photosFront, photosBack, index) {
            if (photosFront.length === 0 && photosBack.length === 0) return;

            const page = document.createElement('div');
            page.className = 'page';
            
            const frontHTML = photosFront.length > 0 
                ? `<div class="photo-grid">${generateGridHTML(photosFront)}</div>`
                : `<div class="flex items-center justify-center h-full text-gray-300">Fin del contenido</div>`;

            const backHTML = photosBack.length > 0
                ? `<div class="photo-grid">${generateGridHTML(photosBack)}</div>`
                : `<div class="flex items-center justify-center h-full text-gray-300 italic">Espacio para notas</div>`;

            page.innerHTML = `
                <div class="front">
                    ${frontHTML}
                </div>
                <div class="back">
                    ${backHTML}
                </div>
            `;
            
            // Añadir logo mini a ambas caras
            const frontDiv = page.querySelector('.front');
            const backDiv = page.querySelector('.back');
            
            const logoFront = document.createElement('img');
            logoFront.src = 'logo_mini.png';
            logoFront.alt = 'Logo Mobil';
            logoFront.className = 'footer-logo';
            frontDiv.appendChild(logoFront);
            
            const logoBack = document.createElement('img');
            logoBack.src = 'logo_mini.png';
            logoBack.alt = 'Logo Mobil';
            logoBack.className = 'footer-logo';
            backDiv.appendChild(logoBack);
            book.appendChild(page);
        }

        function createBackCover() {
            const page = document.createElement('div');
            page.className = 'page';
            page.innerHTML = `
                <div class="front">
                    <div class="flex flex-col items-center justify-center h-full text-gray-400">
                        <p>Total de archivos del album: ${allPhotos.length}</p>
                    </div>
                </div>
                <div class="back cover-back"></div>
            `;

            // Añadir logo mini a contraportada
            const frontDiv = page.querySelector('.front');
            const backDiv = page.querySelector('.back');
            
            const logoFront = document.createElement('img');
            logoFront.src = 'logo_mini.png';
            logoFront.alt = 'Logo Mobil';
            logoFront.className = 'footer-logo';
            frontDiv.appendChild(logoFront);
            
            const logoBack = document.createElement('img');
            logoBack.src = 'logo_mini.png';
            logoBack.alt = 'Logo Mobil';
            logoBack.className = 'footer-logo';
            backDiv.appendChild(logoBack);
            
            book.appendChild(page);
        }

        function getFileExtension(src) {
            return src.split('.').pop().toLowerCase();
        }

        function isVideoFile(src) {
            return ['mp4', 'mov', 'webm', 'ogg'].includes(getFileExtension(src));
        }

        function isBrowserFriendlyImage(src) {
            return ['jpg', 'jpeg', 'png', 'gif', 'webp', 'avif', 'svg'].includes(getFileExtension(src));
        }

        function generateGridHTML(photos) {
            return photos.map(src => {
                if (isVideoFile(src)) {
                    return `
                        <div class="photo-wrapper">
                            <video data-src="${src}" class="lazy-media" muted playsinline preload="none" controls poster="${VIDEO_FALLBACK_POSTER}"></video>
                        </div>
                    `;
                }

                if (isBrowserFriendlyImage(src)) {
                    return `
                        <div class="photo-wrapper">
                            <img data-src="${src}" class="lazy-media" alt="Recuerdo" loading="lazy" decoding="async">
                        </div>
                    `;
                }

                return `
                    <div class="photo-wrapper">
                        <div class="unsupported-media">
                            <strong>${src.split('/').pop()}</strong>
                            <span>Formato no compatible en este navegador</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function applyVideoThumbnail(video) {
            if (!(video instanceof HTMLVideoElement)) return;
            if (video.getAttribute('data-poster-ready') === 'true') return;

            const captureFrame = () => {
                if (video.videoWidth === 0 || video.videoHeight === 0) return;

                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;

                    const ctx = canvas.getContext('2d');
                    if (!ctx) return;

                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const posterDataUrl = canvas.toDataURL('image/jpeg', 0.75);
                    video.setAttribute('poster', posterDataUrl);
                } catch (error) {
                    video.setAttribute('poster', VIDEO_FALLBACK_POSTER);
                }

                video.setAttribute('data-poster-ready', 'true');
                video.pause();
                video.currentTime = 0;
            };

            if (video.readyState >= 2) {
                captureFrame();
                return;
            }

            const onLoadedData = () => captureFrame();
            const onError = () => {
                video.setAttribute('poster', VIDEO_FALLBACK_POSTER);
                video.setAttribute('data-poster-ready', 'true');
            };

            video.addEventListener('loadeddata', onLoadedData, { once: true });
            video.addEventListener('error', onError, { once: true });
        }

        function hydrateMediaNearCurrentPage() {
            const pages = Array.from(document.querySelectorAll('.page'));

            pages.forEach((page, pageIndex) => {
                if (Math.abs(pageIndex - currentPage) > 1) return;

                const lazyMedia = page.querySelectorAll('.lazy-media:not([data-loaded="true"])');
                lazyMedia.forEach(media => {
                    const src = media.getAttribute('data-src');
                    if (!src) return;

                    media.setAttribute('src', src);
                    media.setAttribute('data-loaded', 'true');

                    if (media instanceof HTMLVideoElement) {
                        media.setAttribute('preload', 'metadata');
                        applyVideoThumbnail(media);
                    }
                });
            });
        }

        function flipNextPage() {
            const pages = Array.from(document.querySelectorAll('.page'));
            if (currentPage >= pages.length) return;

            pages[currentPage].classList.add('flipped');
            currentPage += 1;
            updateZIndex();
            hydrateMediaNearCurrentPage();
        }

        function flipPrevPage() {
            const pages = Array.from(document.querySelectorAll('.page'));
            if (currentPage <= 0) return;

            currentPage -= 1;
            pages[currentPage].classList.remove('flipped');
            updateZIndex();
            hydrateMediaNearCurrentPage();
        }

        function handleBookTap(clientX) {
            const rect = book.getBoundingClientRect();
            const x = clientX - rect.left;

            if (x > rect.width * 0.5) {
                flipNextPage();
            } else {
                flipPrevPage();
            }
        }

        function setupBookInteractions() {
            let touchStartX = 0;

            book.addEventListener('click', function(event) {
                if (Date.now() - lastTouchTime < 500) return;
                handleBookTap(event.clientX);
            });

            book.addEventListener('touchstart', function(event) {
                touchStartX = event.changedTouches[0].clientX;
            }, { passive: true });

            book.addEventListener('touchend', function(event) {
                const touchEndX = event.changedTouches[0].clientX;
                const deltaX = touchEndX - touchStartX;
                lastTouchTime = Date.now();

                if (Math.abs(deltaX) > 35) {
                    if (deltaX < 0) {
                        flipNextPage();
                    } else {
                        flipPrevPage();
                    }
                    return;
                }

                handleBookTap(touchEndX);
            }, { passive: true });
        }

        function updateZIndex() {
            const pages = Array.from(document.querySelectorAll('.page'));
            pages.forEach((page, index) => {
                if (page.classList.contains('flipped')) {
                    page.style.zIndex = index;
                } else {
                    page.style.zIndex = pages.length - index;
                }
            });
        }

        initAlbum();
    </script>
</body>
</html>
